name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read
  security-events: write

# PR에 연속 푸시 시 오래된 실행을 취소(러너 시간 절약). main 푸시는 취소하지 않는다.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  secret-scan:
    runs-on: macos-15 # release.yml과 러너 통일(재현성)

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0

      - name: Install Gitleaks
        run: brew install gitleaks

      - name: Run Gitleaks
        id: gitleaks
        continue-on-error: true
        run: |
          gitleaks git \
            --config ./.gitleaks.toml \
            --report-format sarif \
            --report-path gitleaks-report.sarif

      - name: Upload Gitleaks SARIF
        if: always() && hashFiles('gitleaks-report.sarif') != ''
        uses: github/codeql-action/upload-sarif@7188fc363630916deb702c7fdcf4e481b751f97a # v4
        with:
          sarif_file: gitleaks-report.sarif

      - name: Fail job when Gitleaks finds leaks
        if: steps.gitleaks.outcome == 'failure'
        run: |
          echo "Gitleaks detected secrets."
          exit 1

  lint-and-build:
    runs-on: macos-15 # release.yml과 러너 통일(재현성)

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@ed7a3b1fda3918c0306d1b724322adc0b8cc0a90 # v1
        with:
          xcode-version: latest-stable

      - name: Install Swift tooling (pinned)
        # brew(항상 최신)는 룰 드리프트로 CI를 깨뜨릴 수 있어 릴리스 바이너리를 버전+SHA-256으로 고정.
        # 업그레이드는 의도적 변경으로: 버전과 체크섬을 함께 갱신하고 로컬 brew 버전과 맞춘다.
        env:
          SWIFTFORMAT_VERSION: 0.62.1
          SWIFTFORMAT_SHA256: 7cb1cb1fae04932047c7015441c543848e8e60e1572d808d080e0a1f1661114a
          SWIFTLINT_VERSION: 0.65.0
          SWIFTLINT_SHA256: d6cb0aa7a2f5f1ef306fc9e37bcb54dc9a26facc8f7784ac0c3dd3eccf5c6ba6
        run: |
          curl -fsSL -o "$RUNNER_TEMP/swiftformat.zip" \
            "https://github.com/nicklockwood/SwiftFormat/releases/download/${SWIFTFORMAT_VERSION}/swiftformat.zip"
          echo "${SWIFTFORMAT_SHA256}  ${RUNNER_TEMP}/swiftformat.zip" | shasum -a 256 -c -
          curl -fsSL -o "$RUNNER_TEMP/swiftlint.zip" \
            "https://github.com/realm/SwiftLint/releases/download/${SWIFTLINT_VERSION}/portable_swiftlint.zip"
          echo "${SWIFTLINT_SHA256}  ${RUNNER_TEMP}/swiftlint.zip" | shasum -a 256 -c -
          mkdir -p "$RUNNER_TEMP/swift-tools"
          unzip -oq "$RUNNER_TEMP/swiftformat.zip" -d "$RUNNER_TEMP/swift-tools"
          unzip -oq "$RUNNER_TEMP/swiftlint.zip" -d "$RUNNER_TEMP/swift-tools"
          echo "$RUNNER_TEMP/swift-tools" >> "$GITHUB_PATH"
          "$RUNNER_TEMP/swift-tools/swiftformat" --version
          "$RUNNER_TEMP/swift-tools/swiftlint" --version

      - name: SwiftFormat
        run: swiftformat ./Azimuth --config ./.swiftformat --lint

      - name: SwiftLint
        run: swiftlint lint --strict --no-cache --config ./.swiftlint.yml

      - name: Xcode build
        run: |
          xcodebuild \
            -project ./Azimuth.xcodeproj \
            -scheme Azimuth \
            -configuration Debug \
            -destination 'platform=macOS' \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Tests + coverage gate (pure logic >= 90%)
        run: make coverage # 테스트 실행 + 순수 로직 라인 ≥ 90% 게이트(중복 test 스텝 제거)
